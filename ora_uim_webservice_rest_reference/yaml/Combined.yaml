            networkAddressType:
              type: string
              description: 'The type of network address, either IP Subnet or flow identifier.'
            ownedBy:
              $ref: '#/components/schemas/RelatedPartyRef'
            managedBy:
              $ref: '#/components/schemas/RelatedPartyRef'
    FlowIdentifier:
