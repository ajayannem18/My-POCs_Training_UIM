            zendTerminationPoint:
              type: string
              format: uri
              description: The URI for zterminationPoint of the pipe.
            primaryPathEnabled:
                $ref: '#/components/schemas/PipeEnablement' 
            secondaryPathEnabled:
                $ref: '#/components/schemas/PipeEnablement'
