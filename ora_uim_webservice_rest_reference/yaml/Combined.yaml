paths:
  /service:
    get:
      operationId: listService
      summary: Get Services
      description: |
        Gets all services that match the search criteria specified in the query parameters. <p>Attribute selection is enabled for all first-level attributes.
        <p>The <b>includeAll</b> query parameter is required to list all services, including CFS and RFS. The default includes only CFS. <p>
                                                                                        
        <p>The criteria can include these properties:<p>
        <ul>
        <li>name</li>
        <li>description</li>
        <li>state</li>
        <li>serviceSpecification.name</li>
        <li>category</li>
        <li>serviceDate</li>
        <li>supportingResource.id</li>
        <li>relatedParty.id</li>
        <li>serviceCharacteristic.{charName}=value</li>
        <li>externalIdentity.externalManagementDomain</li>
        <li>externalIdentity.externalName</li>
        <li>externalIdentity.externalObjectId</li>
        </ul>
        <p>
        These criteria operators can be used on the filtering properties. Equals operator is supported for all filtering properties. RegEx operator is supported only on service characteristic searches.Service characteristic search is applicable only on Service Chars and not Service Configuration Item Chars. Operators can be string literals or URL-encoded format. <b>serviceDate</b> filter can be used with operators equals, less than equals and greater than equals.
        <ul>
        <li> .eq (OR) = (OR) %3D%3D <p> For example: state=active (OR) state==active (OR) state%3D%3Dactive (OR) state.eq=active </li>
        <li> .regex (with ^) <p> For example: name.regex=^broadband (OR) name*=^broadband (OR) name*=%5Ebroadband </li>
        <li> .regex (with $) <p> For Example: name.regex=broadband$ (OR) name*=broadband$ (OR) name*=broadband%24</li>
        <li> .regex (with ^.*) <p> For example: name.regex=^.*broadband (OR) name*=^.*broadband (OR) name*=%5E.*broadband </li>
        </ul>

        <p><p>Optionally, use the <b>expand</b> parameter to specify any service relationships (or) supporting services (expand=supportingService,serviceRelationship)that you want to see details for. By default, you'll just see links for these.
        
        <p>To view additional details of resource, party, place set <b>expand</b> to supportingResource, relatedParty and/or place respectively(expand=supportingResource,relatedParty,place).

        <p>Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.

        <p>Optionally, use the <b>sort</b> parameter to sort the search results.<p>
        Usage: <b>sort=</b>(<i>Direction</i>)<i>Fields</i>
        <p>where <i>Direction</i> is '-' for descending order, and '+' for ascending order. For example: <b>sort=-id,name</b>
        <p>These fields can be sorted:
        <ul>
        <li>id</li>
        <li>name</li>
        <li>description</li>
        <li>serviceSpecification.name</li>
        </ul>
        <p>
      tags:
        - Service
      parameters:
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
        - name: includeAll
          schema:
            type: boolean
          in: query
          description: Set to true to search for all services including CFS and RFS. By default service search includes only CFS.
      responses:
        '200':
          description: The services were retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
        '206':
          description: A range of services were returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resources weren't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createService
      summary: Create a Service
      description: |
        Creates a service with the given details.
        supportingService property is not allowed as part of createService request body. supportingService is managed by DesignAndAssign custom code.
        It auto creates service configuration and moves to designed or completed state based on state attribute provided in the input. <p>The following fields are mandatory fields for successful creation&colon; 
        <p>
        <ul>
        <li>name</li>
        <li>serviceSpecification</li>
        <li>state</li>
        </ul> 
        <p>
      tags:
        - Service
      requestBody:
        description: The service to be created
        required: true
        content:
          application/json:
            schema:
               $ref: '#/components/schemas/Service'
      responses:
        '201':
          description: The service was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resources wasn't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'  
  '/service/{id}':
    get:
      operationId: retrieveService
      summary: Get a Service by ID
      description: |
        Gets the service that matches the specified ID. <p>Attribute selection is enabled for all first-level attributes.<p>
        Optionally, use the <b>expand</b> parameter to specify any service relationships (or) supporting services (expand=supportingService,serviceRelationship)that you want to see details for. By default, you'll just see links for these.<p>
        Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.
        <p>
      tags:
        - Service
      parameters:
        - name: id
          required: true
          schema:
            type: string
          in: path
          description: The ID of the service to get.
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
