              $ref: '#/components/schemas/Equipment'
            roles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
              description: The list of physical port inventory roles.
    PhysicalConnector:
      description: A physical connector.
      allOf:
        - $ref: '#/components/schemas/PhysicalResource'
