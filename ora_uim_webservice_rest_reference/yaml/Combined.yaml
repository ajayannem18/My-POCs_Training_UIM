    post:
      operationId: processConnectivity
      summary: Process a Connectivity
      description: |
          This operation performs an action denoted by task on latest Connectivity design version of given connectivity Id (or identifier). 
          Supported tasks are COMPLETE and CANCEL. These can be used to complete a design version or cancel it respectively.</br>
          NOTE: <i>{connectivityIdentifier}</i> in path parameter can be connectivityIdentifier or Id of the connectivity.
          Process a Connectivity Design version is an explicit operation for Connectivity resource. Hence, these task APIs are not supported on '/resource' URL.
      tags:
        - Resource/Connectivity
      parameters:
        - name: connectivityIdentifier
          required: true
          schema:
            type: string
          in: path
          description: The connectivityIdentifier of the Connectivity to process.
        - name: task
          required: true
          schema:
            type: string
          in: path
