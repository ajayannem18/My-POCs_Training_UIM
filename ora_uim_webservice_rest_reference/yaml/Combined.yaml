      operationId: deleteService
      summary: Delete a Service
      description: This operation deletes a Service entity.
      tags:
        - Service
      parameters:
        - required: true
          name: id
          in: path
          schema:
            type: string
          description: The ID of the service to delete.
      responses:
        '204':
          description: The resource was deleted successfully.
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resource wasn't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateService
      summary: Update a Service
      description: |
        Updates the Service that matches the specified ID. Update can be performed using merge-patch. Kindly note that ID and ServiceSpecification cannot be updated and must not be provided in the PATCH requests. <p>Merge Patch:<p> All attributes provided in the request will be updated with the given values. 
        If <b>designOnly</b> flag is true, then service will be in designed state otherwise it moves to completed state.
        Service can be suspended/resumed/terminated using PATCH by providing the required "state" in input request. For suspend and resume service action, designOnly param is not required.
        <p>Attribute selection is enabled for all first-level attributes.<p>
        Optionally, use the <b>expand</b> parameter to specify any service relationships that you want to see details for. By default, you'll just see links for these.<p>
        Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.
        <p>
      tags:
        - Service
      parameters:
        - required: true
          name: id
          in: path
          schema:
            type: string
          description: The ID of the service to update.
        - name: designOnly
          schema:
            type: boolean
          in: query
          description: This flag is used to control activation flow of the service. When it is 'true', service is designed with patched attributes but it is not activated. When it is 'false', service is designed with patched attributes and sequentially Approve/Issue/Activate requests are executed and moves service state to active. 
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
      requestBody:
        description: The service to be updated
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/Service'
      responses:
        '200':
          description: The service was updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resources wasn't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /service/updateResource:
    post:
      operationId: updateConsumerServices
      summary: Reverse Update of Consumable Resource
      description: |
        Updates existing resources of the services with new resources provided in the input. The services to be updated can be filtered using the
        criteria. <p>The <b>includeAll</b> query parameter is required to update all services, including CFS and RFS. The default includes only CFS. <p>
        <p>The service filtering criteria can include these properties:<p>
        <ul>
        <li>id</li>
        <li>filterAssignAndRefState</li>
        <li>filterServiceState</li>
        <li>filterConfigurationState</li>
        </ul>
        <p>
      tags:
        - Service
      parameters:
        - name: id
          required: false
          schema:
            type: string
          in: query
          description: Optional Service ID's , comma separated values, on which resource updates to be made.
        - name: filterAssignAndRefState
          required: false
          schema:
            type: string
          in: query
          description: Filter on assignment and reference states with comma separated values. Valid values are ASSIGNED,PENDING_ASSIGN,REFERENCED,PENDING_REFERENCED. Ex:If ASSIGNED,REFERENCED is provided in filter then only resources with these assignment states are updated with new resources. Default includes all above mentioned states.
        - name: filterServiceState
          required: false
          schema:
            type: string
          in: query
          description: Filter on service states with comma separated values. Valid values are ACTIVE, DESIGNED, INACTIVE. Ex:If ACTIVE is provided in filter then only services with these states are considered for updates. By default updates happen only for ACTIVE,DESIGNED,INACTIVE. Services with states TERMINATED,CANCELLED,PENDING_CANCEL, PENDING_DISCONNECT and CANCELPENDINGDISCONNECT are not considered for updates.
        - name: filterConfigurationState
          required: false
          schema:
            type: string
          in: query
          description: Filter on configuration state with comma separated values. Valid values are COMPLETED, IN_PROGRESS, DESIGNED, ISSUED. Ex:If COMPLETED is provided in filter then only latest service configuration with these states are considered for updates.
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
      requestBody:
        description: The existing resources of the services will be updated with new resources.
        required: true
        content:
          application/json:
            schema:
               type: array
               items:
                 $ref: '#/components/schemas/UpdateConsumableResource'
      responses:
        '200':
          description: The services were updated successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
              
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/service/{id}/{task}':
    post:
      operationId: processService
      summary: Process a Service
      description: |
        This operation processes a Service entity for a given task. Possible tasks are APPROVE, ISSUE, ACTIVATE and CANCEL. 
        <p>The following values are the possible tasks to process a service&colon;<p>
        <ul>
        <li>approve: It approves the IN_PROGRESS service configuration of a service.</li>
        <li>issue: It issues the DESIGNED service configuration of a service.</li>
        <li>activate: It completes the ISSUED service configuration of a service.</li>
        <li>cancel: It cancels the IN_PROGRESS service configuration of a service.</li> 
        </ul>
        <p>Attribute selection is enabled for all first-level attributes.<p>
        Optionally, use the <b>expand</b> parameter to specify any service relationships (or) supporting services (expand=supportingService,serviceRelationship)that you want to see details for. By default, you'll just see links for these.<p>
        Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.
      tags:
        - Service
      parameters:
        - name: id
          required: true
          schema:
            type: string
          in: path
          description: The ID of the service to process.
        - name: task
          required: true
          schema:
            type: string
          in: path
          description: The task of the service to process. Possible tasks are APPROVE, ISSUE, ACTIVATE and CANCEL.
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: The service was processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resources wasn't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /bundle:
    post:
      operationId: createOrUpdateBundleService
      summary: Create/Update a Bundle Service
      description: |
        Create or Update a Bundle Service based on id provided in the input. Create a bundle service when id is not provided in the input, otherwise it will update the existing bundle service. 
        If designOnly flag is true, then bundle service will be in designed state otherwise it moves to completed state.
        <p>Create a bundle service with the given details incase of bundle id is not provided in input. The following fields are mandatory fields in each of the bundle service items for successful creation&colon; 
        <p>
        <ul>
        <li>name</li>
        <li>serviceSpecification</li>
        <li>state</li>
        </ul> 
        <p>
        Updation of bundle service can be performed when bundle id provided in the input. Kindly note that id,description,name,supportingResource,relatedParty,serviceCharacteristic,place,externalIdentity are the only attributes to be passed under each of the items during updation of bundle service.
        <p>Attribute selection is enabled for all first-level attributes.<p>
        Optionally, use the <b>expand</b> parameter to specify any service relationships that you want to see details for. By default, you'll just see links for these.<p>
        Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.
        <p>
      tags:
        - Service/Bundle
      parameters:
        - name: designOnly
          schema:
            type: boolean
          in: query
          description: This flag is used to control activation flow. When it is 'true', changes applied but not activated. When it is 'false', changes applied and sequentially Approve/Issue/Activate requests executed to activate changes.  
      requestBody:
        description: The Bundle service to be created
        required: true
        content:
          application/json:
            schema:
               $ref: '#/components/schemas/BundleService'
      responses:
        '201':
          description: The bundle service was created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleService'
        '400':
          description: The request isn't valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: You aren't authorized to make this request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: The request is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The resources wasn't found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: An internal server error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'  
  '/bundle/{id}/{task}':
    post:
      operationId: processBundleService
      summary: Process a Bundle Service
      description: |
        This operation processes a Bundle Service entity. Possible tasks are APPROVE, ISSUE, ACTIVATE and CANCEL.
        <p>The following values are the possible tasks to process a bundle service&colon;<p>
        <ul>
        <li>approve: It approves the IN_PROGRESS service configuration of all services in bundle.</li>
        <li>issue: It issues the DESIGNED service configuration of all services in bundle.</li>
        <li>activate: It completes the ISSUED service configuration of all services in bundle.</li>
        <li>cancel: It cancels the IN_PROGRESS service configuration of all services in bundle.</li> 
        </ul>
        <p>Attribute selection is enabled for all first-level attributes.<p>
        Optionally, use the <b>expand</b> parameter to specify any service relationships (or) supporting services (expand=supportingService,serviceRelationship)that you want to see details for. By default, you'll just see links for these.<p>
        Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.
      tags:
        - Service/Bundle
      parameters:
        - name: id
          required: true
          schema:
            type: string
          in: path
          description: The ID of the bundle service to process.
        - name: task
          required: true
          schema:
            type: string
          in: path
