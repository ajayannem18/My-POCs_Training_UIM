          type: string
          description: The ID of the Activity.        
        activityName:
          type: string
          description: The name of the activity.
        status:
            $ref : '#/components/schemas/ActivityStateEnum'
        activityItems:
          type : array
          items:            
             $ref: '#/components/schemas/RehomeActivityItem'               
        impactedItems:
          type : array
          items:
            $ref:  '#/components/schemas/ImpactedItem'                            
    RehomeActivityItem:
      type: object
