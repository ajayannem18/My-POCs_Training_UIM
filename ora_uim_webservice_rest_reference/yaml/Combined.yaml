              $ref: '#/components/schemas/PlaceRef'
              description: The property location code for terminationPoint. 
            pipeRef:
              $ref: '#/components/schemas/Pipe'
            connectivityRef:
              $ref: '#/components/schemas/Connectivity'
    CapacityProvided:
      type: object
