  /resource:
    get:
      operationId: retrieveResources
      summary: Get Resources
      description: |
        Gets all resources that match the search criteria specified in the query parameters. <p>Attribute selection is enabled for all first-level attributes.
        <p>The <b>@type</b> query parameter is required for optimal results. <p>
                                                                                        
        <p>The criteria can include these properties:<p>
        <ul>
        <li>name</li>
        <li>lifecycleState</li>
        <li>lifecycleSubState</li>
        <li>resourceSpecification.name</li>
        <li>resourceCharacteristic.{charName} = value</li>
        <li>category</li>
        </ul>
        <p>
        These criteria operators can be used on the filtering properties. Operators can be string literals or URL-encoded format.
        <ul>
        <li> .eq (OR) = (OR) %3D%3D <p> For example: lifecycleState=UNASSIGNED (OR) lifecycleState==UNASSIGNED (OR) lifecycleState%3D%3DUNASSIGNED lifecycleState.eq=UNASSIGNED </li>
        <li> .gte (OR) >= (OR) %3E%3D <p> For example: startDate.gte=2013-04-20 (OR) startDate>=2013-04-20 (OR) startDate %3E%3D2013-04-20 </li>
        <li> .lte (OR) <= (OR) %3C%3D <p> startDate.lte=2013-04-20 (OR) startDate<=2013-04-20 (OR) startDate %3C%3D2013-04-20 </li>
        <li> .regex (with !) <p> For example: vendorPortName.regex=!cisco (OR) vendorPortName*=!cisco </li>
        <li> .regex (with ^) <p> For example: vendorPortName.regex=^cisco (OR) vendorPortName*=^cisco (OR) vendorPortName*=%5Ecisco </li>
        <li> .regex (with $) <p> For Example: vendorPortName.regex=cisco$ (OR) vendorPortName*=cisco$ (OR) vendorPortName*=cisco%24</li>
        <li> .regex (with ^.*) <p> For example: vendorPortName.regex=^.*cisco (OR) vendorPortName*=^.*cisco (OR) vendorPortName*=%5E.*cisco </li>
        </ul>

        <p>Optionally, use the <b>expand</b> parameter to specify any resource relationships (resourceRelationship.PARENT,resourceRelationship.CHILD, resourceRelationship.ASSOCIATES, resourceRelationship.INVOLVE, and resourceRelationship.MAPPEDTO) that you want to see details for. By default, you'll just see links for these.

        <p>Optionally, use the <b>depth</b> parameter to expand the level of referenced entities. If <b>depth=0</b>, all referenced entities in RootEntity objects will contain only the ID, HREF, and @type. If <b>depth=N</b>, it expands reference objects of related entities recursively, and the last level contains only the references. The default is <b>depth=0</b>.

        <p>Optionally, use the <b>sort</b> parameter to sort the search results.<p>
        Usage: <b>sort=</b>(<i>Direction</i>)<i>Fields</i>
        <p>where <i>Direction</i> is '-' for descending order, and '+' for ascending order. For example: <b>sort=-id,name</b>
        <p>These fields can be sorted:
        <ul>
        <li>id</li>
        <li>name</li>
        <li>description</li>
        <li>lifecycleState</li>
        <li>resourceSpecification.name</li>
        </ul>
        <p>
      tags:
        - Resource
      parameters:
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/sort'
        - $ref: '#/components/parameters/depth'
        - $ref: '#/components/parameters/expand'
      responses:
        '200':
          description: The resources were retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceBase'
        '206':
          description: A range of resources were returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
